name: Upload latest CDN image to GHCR

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
    paths:
      - "cdn/**"

env:
  IMAGE_NAME: "voyage-cdn"

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lower case owner name
        id: repo_owner
        run: |
          LOWER_OWNER="${OWNER,,}"
          echo "REPO_OWNER=${LOWER_OWNER}" >>"$GITHUB_ENV"
          echo "repo_owner=${LOWER_OWNER}" >>"$GITHUB_OUTPUT"
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Build Docker images
        run: docker buildx build --platform linux/amd64,linux/arm64 --push -t ghcr.io/$REPO_OWNER/$IMAGE_NAME:latest ./cdn
